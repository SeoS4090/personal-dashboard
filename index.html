<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <!-- deploy-trigger -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=ce56a23">
  <link rel="stylesheet" href="css/layout.css?v=ce56a23">
  <link rel="stylesheet" href="css/components.css?v=ce56a23">
</head>
<body>

<div id="app">

  <!-- ── 사이드바 ── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon" id="sidebar-toggle" title="사이드바 접기/펼치기">✦</div>
      <span class="logo-text" id="home-btn" title="홈으로">Dashboard</span>
    </div>

    <nav class="sidebar-nav" style="flex:1; overflow-y:auto; padding: 8px 8px 0;">

      <!-- Life -->
      <div class="nav-section">
        <div class="nav-section-label">Life</div>
        <div class="nav-item" data-menu="life" style="--item-color: var(--color-life)">
          <span class="nav-icon">🌿</span>
          <span class="nav-label">Life</span>
        </div>
        <div class="nav-sub" id="sub-life">
          <div class="nav-sub-item" data-panel="life-readme" style="--item-color: var(--color-life)">📖 ReadMe</div>
          <div class="nav-sub-item" data-panel="life-calendar" style="--item-color: var(--color-life)">📅 일정</div>
          <div class="nav-sub-item" data-panel="life-news" style="--item-color: var(--color-life)">📰 뉴스</div>
          <div class="nav-sub-item" data-panel="life-srello" style="--item-color: var(--color-life)">📋 Srello</div>
        </div>
      </div>

      <!-- Game -->
      <div class="nav-section">
        <div class="nav-section-label">Game</div>
        <div class="nav-item" data-menu="game" style="--item-color: var(--color-game)">
          <span class="nav-icon">🎮</span>
          <span class="nav-label">Game</span>
        </div>
        <div class="nav-sub" id="sub-game">
          <div class="nav-sub-item" data-panel="game-readme" style="--item-color: var(--color-game)">📖 ReadMe</div>
          <div class="nav-sub-item" data-panel="game-dashboard" style="--item-color: var(--color-game)">🎯 대시보드</div>
        </div>
      </div>

      <!-- Dev -->
      <div class="nav-section">
        <div class="nav-section-label">Dev</div>
        <div class="nav-item" data-menu="dev" style="--item-color: var(--color-dev)">
          <span class="nav-icon">⚡</span>
          <span class="nav-label">Dev</span>
        </div>
        <div class="nav-sub" id="sub-dev">
          <div class="nav-sub-item" data-panel="dev-readme" style="--item-color: var(--color-dev)">📖 ReadMe</div>
          <div class="nav-sub-item" data-panel="dev-dashboard" style="--item-color: var(--color-dev)">🗂️ 프로젝트</div>
        </div>
      </div>

      <!-- Media -->
      <div class="nav-section">
        <div class="nav-section-label">Media</div>
        <div class="nav-item" data-menu="media" style="--item-color: var(--color-media)">
          <span class="nav-icon">🎵</span>
          <span class="nav-label">Media</span>
        </div>
        <div class="nav-sub" id="sub-media">
          <div class="nav-sub-item" data-panel="media-readme" style="--item-color: var(--color-media)">📖 ReadMe</div>
          <div class="nav-sub-item" data-panel="media-dashboard" style="--item-color: var(--color-media)">✨ 대시보드</div>
        </div>
      </div>

    </nav>

    <!-- 하단: 설정 + 버전 -->
    <div class="sidebar-footer">
      <div class="nav-item" data-panel="settings" style="--item-color: var(--text-muted)">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">설정</span>
      </div>
      <div class="sidebar-version" id="build-ver" title="빌드 버전"></div>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <div id="main">

    <!-- 상단 바 -->
    <header id="topbar">
      <button class="btn btn-icon" id="mobile-toggle" style="display:none">☰</button>
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-breadcrumb" id="topbar-breadcrumb"></div>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <div id="topbar-date" style="font-size:12px; color: var(--text-muted);"></div>
      </div>
    </header>

    <!-- 콘텐츠 -->
    <main id="content">

      <!-- ── 홈 대시보드 (인라인 — 즉시 표시) ── -->
      <section class="panel active" id="panel-home">
        <div class="section-header">
          <div>
            <div class="section-title">안녕하세요 👋</div>
            <div class="section-desc" id="home-date-desc">오늘도 좋은 하루 되세요.</div>
          </div>
        </div>

        <div class="widget-grid">
          <!-- Life 카드 -->
          <div class="card" style="cursor:pointer; border-color: rgba(100,255,218,0.15)" onclick="App.navigate('life-calendar')">
            <div class="card-header">
              <div>
                <div class="card-title" style="color:var(--color-life)">🌿 Life</div>
                <div class="card-subtitle">일정 · 뉴스 · Srello</div>
              </div>
              <span style="font-size:28px; opacity:.4">🌿</span>
            </div>
            <div id="home-life-preview" style="font-size:13px; color:var(--text-muted)">로딩 중...</div>
          </div>

          <!-- Game 카드 -->
          <div class="card" style="cursor:pointer; border-color: rgba(255,107,157,0.15)" onclick="App.navigate('game-dashboard')">
            <div class="card-header">
              <div>
                <div class="card-title" style="color:var(--color-game)">🎮 Game</div>
                <div class="card-subtitle">게임 기록 · 정보</div>
              </div>
              <span style="font-size:28px; opacity:.4">🎮</span>
            </div>
            <div style="font-size:13px; color:var(--text-muted)">준비 중</div>
          </div>

          <!-- Dev 카드 -->
          <div class="card" style="cursor:pointer; border-color: rgba(124,131,255,0.15)" onclick="App.navigate('dev-dashboard')">
            <div class="card-header">
              <div>
                <div class="card-title" style="color:var(--color-dev)">⚡ Dev</div>
                <div class="card-subtitle">개인 프로젝트 · GitHub</div>
              </div>
              <span style="font-size:28px; opacity:.4">⚡</span>
            </div>
            <div style="font-size:13px; color:var(--text-muted)">준비 중</div>
          </div>

          <!-- Media 카드 -->
          <div class="card" style="cursor:pointer; border-color: rgba(255,209,102,0.15)" onclick="App.navigate('media-dashboard')">
            <div class="card-header">
              <div>
                <div class="card-title" style="color:var(--color-media)">🎵 Media</div>
                <div class="card-subtitle">음악 · 영화 · 유튜브</div>
              </div>
              <span style="font-size:28px; opacity:.4">🎵</span>
            </div>
            <div style="font-size:13px; color:var(--text-muted)">준비 중</div>
          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<!-- 토스트 컨테이너 -->
<div id="toast-container"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>window.BUILD_VER='ce56a23';</script>
<script src="js/modules/life/srello-projects.js?v=ce56a23"></script>
<script src="js/modules/life/srello-sync.js?v=ce56a23"></script>
<script src="js/modules/life/srello.js?v=ce56a23"></script>
<script src="js/modules/life/news.js?v=ce56a23"></script>
<script src="js/modules/life/calendar.js?v=ce56a23"></script>
<script src="js/app.js?v=ce56a23"></script>

</body>
</html>
