<!DOCTYPE html>
<html lang="ko" data-depth="2">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 03 | Games</title>
    <script src="../../js/settings.js"></script>
    <script src="../../js/site-config.js"></script>

    <script src="../../js/main.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <header id="site-header"></header>
      <main class="site-main">
        <nav class="breadcrumb" aria-label="breadcrumb">
          <a href="../../index.html">Home</a>
          <span aria-hidden="true">/</span>
          <a href="../index.html">Games</a>

          <a class="btn btn-ghost" href="../index.html">← Games</a>

      </main>
      <div id="site-footer"></div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".breadcrumb a, .btn-ghost").forEach(function (a) {
          var h = a.getAttribute("href");
          if (h === "../../index.html") a.href = SitePaths.page("index.html");
          if (h === "../index.html") a.href = SitePaths.page("games/index.html");
        });
        SiteUI.init({ activeNav: "games" });
      });
    </script>
  </body>
</html>
