<!DOCTYPE html>
<html lang="ko" data-depth="2">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LogDec01 — 자동 전투 로그라이크 프로토타입" />
    <title>LogDec01 | Games</title>
    <script src="../../js/settings.js"></script>
    <script src="../../js/site-config.js"></script>
    <script src="../../js/paths.js"></script>
    <script src="../../js/main.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <header id="site-header"></header>

      <main class="site-main">
        <nav class="breadcrumb" aria-label="breadcrumb">
          <a href="../../index.html">Home</a>
          <span aria-hidden="true">/</span>
          <a href="../index.html">Games</a>
          <span aria-hidden="true">/</span>
          <span aria-current="page">LogDec01</span>
        </nav>

        <article class="project-body">
          <h1>LogDec01 <span class="badge badge--dev">프로토타입</span></h1>
          <p class="hero-lead">
            자동 전투·덱 빌딩·상점 루프 1차 플레이어블. 기획은 <code>기획/</code>, 코드는
            <code>games/logdec01/</code>.
          </p>
          <p>
            자동 전투·HP/방어·상점·덱 구성 규칙 기반 웹 프로토타입입니다. 5직업 선택 후
            전투·상점·덱 편집 루프를 플레이할 수 있습니다.
          </p>
          <div class="game-actions" style="margin-top: 1.5rem">
            <a class="btn btn-primary" href="play.html" id="btn-play">게임 플레이</a>
            <a class="btn btn-ghost" href="../index.html" id="btn-games-back">← Games 목록</a>
          </div>
        </article>
      </main>

      <div id="site-footer"></div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".breadcrumb a").forEach(function (a) {
          var href = a.getAttribute("href");
          if (href === "../../index.html") a.href = SitePaths.page("index.html");
          if (href === "../index.html") a.href = SitePaths.page("games/index.html");
        });
        var playBtn = document.getElementById("btn-play");
        if (playBtn) playBtn.href = SitePaths.page("games/logdec01/play.html");
        var backBtn = document.getElementById("btn-games-back");
        if (backBtn) backBtn.href = SitePaths.page("games/index.html");
        SiteUI.init({ activeNav: "games" });
      });
    </script>
  </body>
</html>
