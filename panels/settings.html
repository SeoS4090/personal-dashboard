<section class="panel" id="panel-settings">
  <div class="section-header">
    <div>
      <div class="section-title">⚙️ 설정</div>
      <div class="section-desc">API 키 및 개인 설정</div>
    </div>
  </div>
  <div style="max-width: 560px; display:flex; flex-direction:column; gap:16px;">

    <div class="card">
      <div class="card-header">
        <div class="card-title">🎨 외관</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:18px;">

        <!-- 테마 -->
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:6px;">테마</label>
          <div class="setting-btn-group">
            <button class="setting-btn" data-group="theme" data-value="dark">🌙 다크</button>
            <button class="setting-btn" data-group="theme" data-value="light">☀️ 라이트</button>
            <button class="setting-btn" data-group="theme" data-value="system">💻 시스템</button>
          </div>
        </div>

        <div class="divider" style="margin:0;"></div>

        <!-- 글자 크기 -->
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:10px;">글자 크기</label>
          <div style="display:flex; flex-direction:column; gap:12px;">

            <div class="fs-row">
              <div class="fs-row-label">
                <span>섹션 제목</span>
                <span class="fs-row-value" id="fs-val-title">20px</span>
              </div>
              <input type="range" class="fs-slider" id="fs-title"
                     min="14" max="30" step="1" value="20"
                     data-fs-key="fs_title" data-css-var="--fs-title">
            </div>

            <div class="fs-row">
              <div class="fs-row-label">
                <span>카드 제목</span>
                <span class="fs-row-value" id="fs-val-card">14px</span>
              </div>
              <input type="range" class="fs-slider" id="fs-card"
                     min="11" max="20" step="1" value="14"
                     data-fs-key="fs_card" data-css-var="--fs-card">
            </div>

            <div class="fs-row">
              <div class="fs-row-label">
                <span>본문 · 버튼 · 입력</span>
                <span class="fs-row-value" id="fs-val-body">13px</span>
              </div>
              <input type="range" class="fs-slider" id="fs-body"
                     min="10" max="18" step="1" value="13"
                     data-fs-key="fs_body" data-css-var="--fs-body">
            </div>

            <div class="fs-row">
              <div class="fs-row-label">
                <span>설명 · 레이블</span>
                <span class="fs-row-value" id="fs-val-desc">12px</span>
              </div>
              <input type="range" class="fs-slider" id="fs-desc"
                     min="9" max="16" step="1" value="12"
                     data-fs-key="fs_desc" data-css-var="--fs-desc">
            </div>

          </div>
        </div>

      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title" style="color:var(--color-life)">📅 Google Calendar</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:12px;">

        <!-- OAuth Client ID -->
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">OAuth 2.0 Client ID</label>
          <input type="text" class="input" id="setting-gcal-clientid" placeholder="xxx.apps.googleusercontent.com">
        </div>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="Calendar.authorize()">Google 계정 연결</button>
          <span id="gcal-auth-status" style="font-size:12px; color:var(--text-muted);">미연결</span>
        </div>

        <div class="divider" style="margin:0;"></div>

        <!-- 캘린더 목록 -->
        <div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
            <label style="font-size:12px; color:var(--text-muted);">캘린더 목록</label>
            <button class="btn btn-sm" id="gcal-fetch-btn" onclick="Settings.fetchCalendarList()">↻ 목록 불러오기</button>
          </div>
          <div id="gcal-calendars-list" style="display:flex; flex-direction:column; gap:6px;"></div>
        </div>

        <div class="divider" style="margin:0;"></div>

        <!-- 주 시작 요일 -->
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:6px;">주 시작 요일</label>
          <div class="setting-btn-group">
            <button class="setting-btn" data-group="week-start" data-value="0">일요일</button>
            <button class="setting-btn" data-group="week-start" data-value="1">월요일</button>
          </div>
        </div>

        <button class="btn btn-primary" onclick="Settings.saveCalendar()">저장</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title" style="color:var(--color-life)">📰 News API</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">NewsAPI.org API Key</label>
          <input type="password" class="input" id="setting-news-apikey" placeholder="API 키 입력">
        </div>
        <div>
          <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">관심 키워드 (쉼표 구분)</label>
          <input type="text" class="input" id="setting-news-keywords" placeholder="게임, 개발, 기술">
        </div>
        <button class="btn btn-primary" onclick="Settings.saveNews()">저장</button>
      </div>
    </div>

  </div>
</section>
